{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - JobExhibition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #87ceeb 0%, #e0f2f1 100%);
            overflow: hidden;
            position: relative;
            padding: 16px;
        }

        .cloud {
            position: absolute;
            background: #ffffff;
            width: 200px;
            height: 60px;
            border-radius: 100px;
            opacity: 0.6;
            filter: blur(15px);
            animation: moveClouds 40s linear infinite;
        }

        .c1 {
            top: 10%;
            animation-duration: 30s;
        }

        .c2 {
            bottom: 20%;
            right: -10%;
            animation-duration: 50s;
        }

        @keyframes moveClouds {
            from { transform: translateX(-200px); }
            to { transform: translateX(110vw); }
        }

        .forgot-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            width: 400px;
            max-width: 100%;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            z-index: 10;
            text-align: center;
            animation: slideUp 0.8s ease;
        }

        .repair-image-box {
            width: 100%;
            height: 220px;
            background: #ffffff;
            position: relative;
            overflow: hidden;
            border-bottom: 3px solid #03a9f4;
        }

        .repair-image-box video,
        .repair-image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .repair-image-box video {
            animation: none;
            transform: none;
        }

        .repair-image-box img {
            animation: pulseImg 4s infinite alternate;
        }

        @keyframes pulseImg {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        .content {
            padding: 30px;
        }

        h2 {
            color: #01579b;
            font-size: 22px;
            margin-bottom: 8px;
        }

        p {
            color: #546e7a;
            font-size: 13px;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .alert {
            margin-bottom: 12px;
            border-radius: 10px;
            padding: 10px 12px;
            border: 1px solid #bfdbfe;
            background: #eff6ff;
            color: #0c4a6e;
            font-size: 12px;
            text-align: left;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 15px 45px 15px 15px;
            border-radius: 12px;
            border: 1.5px solid #cfd8dc;
            outline: none;
            font-size: 14px;
            transition: 0.3s;
            background: #ffffff;
            color: #0f172a;
        }

        input:focus {
            border-color: #03a9f4;
            box-shadow: 0 0 8px rgba(3, 169, 244, 0.2);
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: #03a9f4;
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 8px 15px rgba(3, 169, 244, 0.2);
        }

        .submit-btn:hover {
            background: #0288d1;
            transform: translateY(-2px);
            box-shadow: 0 12px 20px rgba(3, 169, 244, 0.3);
        }

        .secondary-btn {
            width: 100%;
            padding: 15px;
            background: #e0f2fe;
            color: #0369a1;
            border: 1px solid #bae6fd;
            border-radius: 12px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
        }

        .secondary-btn:hover {
            background: #bae6fd;
            transform: translateY(-2px);
        }

        .button-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .footer-links {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            gap: 12px;
        }

        .footer-links a {
            color: #0288d1;
            text-decoration: none;
            font-weight: 500;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="cloud c1"></div>
    <div class="cloud c2"></div>

    <div class="forgot-card">
        <div class="repair-image-box">
            <video autoplay muted loop playsinline preload="metadata">
                <source src="{% static 'dashboard/video/repair-page-animation.mp4' %}" type="video/mp4">
            </video>
        </div>

        <div class="content">
            <h2>Forgot Password?</h2>
            <p>Enter your registered email or mobile number to repair your account access.</p>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert">{{ message }}</div>
                {% endfor %}
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="input-group">
                    <input type="text" name="identifier" value="{{ form_data.identifier|default:'' }}" placeholder="Email / Mobile" required>
                </div>
                <div class="input-group">
                    <input type="text" name="mobile_otp" value="{{ form_data.mobile_otp|default:'' }}" placeholder="Enter OTP">
                </div>

                <div class="button-row">
                    <button type="submit" name="action" value="send_otp" class="secondary-btn">Send OTP</button>
                    <button type="submit" name="action" value="send_reset_link" class="submit-btn">Reset My Password</button>
                </div>
            </form>

            <div class="footer-links">
                <a href="{% url 'dashboard:login' %}">&larr; Back to Login</a>
                <a href="{% url 'dashboard:login' %}">Try Login</a>
            </div>
        </div>
    </div>
</body>
</html>
