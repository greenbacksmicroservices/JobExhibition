<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ title }} | Job Exhibition</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: 'Poppins', sans-serif;
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 15% 20%, #dcfce7 0, #f0fdf4 42%, #d1fae5 100%);
        padding: 18px;
        overflow: hidden;
      }

      .success-card {
        width: min(520px, 100%);
        border-radius: 24px;
        padding: 34px 28px;
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid rgba(34, 197, 94, 0.26);
        box-shadow: 0 22px 46px rgba(22, 163, 74, 0.2);
        text-align: center;
        animation: rise 0.65s ease-out both;
      }

      .icon-ring {
        width: 88px;
        height: 88px;
        border-radius: 50%;
        margin: 0 auto 16px;
        display: grid;
        place-items: center;
        background: linear-gradient(145deg, #22c55e, #16a34a);
        box-shadow: 0 14px 32px rgba(22, 163, 74, 0.35);
        animation: pulse 1.8s ease-in-out infinite;
      }

      .icon-ring svg {
        width: 44px;
        height: 44px;
        fill: none;
        stroke: #ffffff;
        stroke-width: 2.4;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      h1 {
        font-size: 25px;
        color: #166534;
        margin-bottom: 10px;
      }

      .message {
        margin: 0 auto;
        max-width: 420px;
        color: #15803d;
        background: #dcfce7;
        border: 1px solid #86efac;
        border-radius: 14px;
        padding: 11px 12px;
        font-size: 14px;
        line-height: 1.5;
      }

      .redirect {
        margin-top: 16px;
        color: #166534;
        font-size: 13px;
      }

      .cta {
        margin-top: 14px;
        display: inline-block;
        border-radius: 999px;
        padding: 10px 18px;
        text-decoration: none;
        color: #ffffff;
        background: linear-gradient(90deg, #16a34a, #15803d);
        font-size: 13px;
        font-weight: 700;
      }

      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(18px) scale(0.98);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.05);
        }
      }
    </style>
  </head>
  <body>
    <section class="success-card">
      <div class="icon-ring" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <path d="M5 12.5l4.5 4.5L19 7.5"></path>
        </svg>
      </div>
      <h1>{{ title }}</h1>
      <p class="message">{{ message }}</p>
      <p class="redirect">
        Redirecting to login page in <strong id="countdown">{{ redirect_seconds }}</strong> seconds...
      </p>
      <a class="cta" href="{{ login_url }}">Go To Login</a>
    </section>

    <script>
      (function () {
        var seconds = Number({{ redirect_seconds|default:5 }}) || 5;
        var countdownNode = document.getElementById('countdown');
        var loginUrl = "{{ login_url }}";
        var timer = setInterval(function () {
          seconds -= 1;
          if (countdownNode) {
            countdownNode.textContent = String(Math.max(0, seconds));
          }
          if (seconds <= 0) {
            clearInterval(timer);
            window.location.href = loginUrl;
          }
        }, 1000);
      })();
    </script>
  </body>
</html>
