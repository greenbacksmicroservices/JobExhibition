{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Successful - JobExhibition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            background: linear-gradient(140deg, #d1fae5 0%, #ecfdf5 45%, #f0fdf4 100%);
            overflow: hidden;
            position: relative;
        }

        .glow {
            position: absolute;
            width: 320px;
            height: 320px;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.45;
            animation: floatGlow 8s ease-in-out infinite;
        }

        .glow.one {
            background: #34d399;
            top: -80px;
            left: -80px;
        }

        .glow.two {
            background: #10b981;
            bottom: -100px;
            right: -80px;
            animation-delay: 1.5s;
        }

        @keyframes floatGlow {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(20px); }
        }

        .success-card {
            width: 520px;
            max-width: 100%;
            background: rgba(255, 255, 255, 0.88);
            border: 1px solid rgba(16, 185, 129, 0.25);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(16, 185, 129, 0.2);
            padding: 30px 26px 24px;
            position: relative;
            z-index: 2;
            text-align: center;
            animation: popIn 0.55s ease-out both;
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: translateY(16px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .check-wrap {
            width: 86px;
            height: 86px;
            margin: 0 auto 16px;
            border-radius: 50%;
            background: linear-gradient(145deg, #22c55e, #059669);
            display: grid;
            place-items: center;
            box-shadow: 0 14px 30px rgba(5, 150, 105, 0.35);
            animation: pulse 1.8s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.04); }
        }

        .check-wrap svg {
            width: 42px;
            height: 42px;
            stroke: #fff;
            stroke-width: 2.4;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            font-weight: 700;
            color: #047857;
            background: rgba(16, 185, 129, 0.12);
            border: 1px solid rgba(16, 185, 129, 0.22);
            border-radius: 999px;
            padding: 7px 12px;
            margin-bottom: 12px;
        }

        h1 {
            color: #065f46;
            font-size: 24px;
            line-height: 1.3;
            margin-bottom: 10px;
        }

        .line {
            color: #047857;
            background: rgba(220, 252, 231, 0.8);
            border: 1px solid rgba(16, 185, 129, 0.22);
            border-radius: 12px;
            padding: 10px 12px;
            font-size: 14px;
            text-align: left;
            margin-bottom: 8px;
        }

        .line:last-child {
            margin-bottom: 0;
        }

        .redirect-note {
            margin-top: 16px;
            font-size: 13px;
            color: #065f46;
        }

        .cta-link {
            display: inline-block;
            margin-top: 12px;
            color: #ffffff;
            background: linear-gradient(90deg, #16a34a, #059669);
            text-decoration: none;
            font-size: 13px;
            font-weight: 700;
            border-radius: 999px;
            padding: 10px 18px;
            box-shadow: 0 10px 22px rgba(5, 150, 105, 0.25);
        }

        .cta-link:hover {
            filter: brightness(0.95);
        }
    </style>
</head>
<body>
    <div class="glow one"></div>
    <div class="glow two"></div>

    <div class="success-card">
        <div class="check-wrap" aria-hidden="true">
            <svg viewBox="0 0 24 24">
                <path d="M5 12.5l4.5 4.5L19 7.5"></path>
            </svg>
        </div>
        <div class="tag">{{ role_label|default:"Account" }} Registration</div>
        <h1>{{ title }}</h1>

        {% for line in lines %}
        <div class="line">{{ line }}</div>
        {% endfor %}

        <p class="redirect-note">
            Redirecting to login page in <strong id="countdown">{{ redirect_seconds }}</strong> seconds...
        </p>
        <a class="cta-link" href="{{ login_url }}">Go to Login</a>
    </div>

    <script>
        (function () {
            var seconds = Number({{ redirect_seconds|default:5 }}) || 5;
            var countdownNode = document.getElementById('countdown');
            var loginUrl = "{{ login_url }}";

            var timer = setInterval(function () {
                seconds -= 1;
                if (countdownNode) {
                    countdownNode.textContent = String(Math.max(0, seconds));
                }
                if (seconds <= 0) {
                    clearInterval(timer);
                    window.location.href = loginUrl;
                }
            }, 1000);
        })();
    </script>
</body>
</html>
