<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobExhibition | Welcome</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Outfit', sans-serif; 
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #4060de 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* --- BACKGROUND ANIMATIONS --- */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #4060de 50%, #0077b6 100%);
            z-index: -1;
            animation: gradientShift 15s ease infinite;
        }

        @keyframes gradientShift {
            0% { background: linear-gradient(135deg, #667eea 0%, #4060de 50%, #0077b6 100%); }
            50% { background: linear-gradient(135deg, #0077b6 0%, #667eea 50%, #4060de 100%); }
            100% { background: linear-gradient(135deg, #667eea 0%, #4060de 50%, #0077b6 100%); }
        }

        /* --- FLOATING PARTICLES --- */
        .particles {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: floatUp 20s infinite linear;
            will-change: transform, opacity;
        }

        @keyframes floatUp {
            0% {
                transform: translate3d(0, 0, 0) scale(0.8);
                opacity: 0;
            }
            10% {
                opacity: 0.9;
            }
            80% {
                opacity: 0.9;
            }
            100% {
                transform: translate3d(var(--drift-x, 0px), -130vh, 0) scale(1.15);
                opacity: 0;
            }
        }

        /* --- WELCOME CONTAINER --- */
        .welcome-container {
            position: relative;
            z-index: 10;
            text-align: center;
            color: white;
            max-width: 600px;
            animation: pop-in 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes pop-in {
            0% { 
                opacity: 0; 
                transform: scale(0.8) translateY(30px);
            }
            100% { 
                opacity: 1; 
                transform: scale(1) translateY(0);
            }
        }

        /* --- LOGO SECTION --- */
        .logo-section {
            margin-bottom: 40px;
            animation: slideDown 0.8s ease forwards;
            animation-delay: 0.2s;
            opacity: 0;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            animation: pulse-glow 2s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { 
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1), 0 0 20px rgba(255, 255, 255, 0.3);
            }
            50% { 
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2), 0 0 40px rgba(255, 255, 255, 0.5);
            }
        }

        .logo-icon i {
            font-size: 50px;
            color: #fff;
        }

        /* --- TEXT SECTION --- */
        .welcome-title {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 15px;
            animation: slideDown 0.8s ease forwards;
            animation-delay: 0.4s;
            opacity: 0;
        }

        .welcome-subtitle {
            font-size: 1.3rem;
            font-weight: 300;
            opacity: 0.9;
            margin-bottom: 40px;
            animation: slideDown 0.8s ease forwards;
            animation-delay: 0.6s;
            opacity: 0;
        }

        /* --- WELCOME MESSAGE --- */
        .welcome-message {
            font-size: 1.1rem;
            font-weight: 600;
            padding: 20px 30px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            margin-bottom: 30px;
            animation: slideUp 0.8s ease forwards;
            animation-delay: 0.8s;
            opacity: 0;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* --- PROGRESS BAR --- */
        .progress-container {
            margin-top: 30px;
            animation: slideUp 0.8s ease forwards;
            animation-delay: 1s;
            opacity: 0;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d2ff, #3a86ff);
            border-radius: 10px;
            animation: fillBar 3s ease-out forwards;
        }

        @keyframes fillBar {
            from { width: 0%; }
            to { width: 100%; }
        }

        .progress-text {
            font-size: 0.9rem;
            opacity: 0.8;
            font-weight: 500;
        }

        /* --- LOADING DOTS --- */
        .loading-dots {
            display: inline-flex;
            gap: 8px;
            margin-top: 20px;
        }

        .dot {
            width: 10px;
            height: 10px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(1); opacity: 0.6; }
            40% { transform: scale(1.3); opacity: 1; }
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            .welcome-title {
                font-size: 2.5rem;
            }

            .welcome-subtitle {
                font-size: 1rem;
            }

            .logo-icon {
                width: 80px;
                height: 80px;
            }

            .logo-icon i {
                font-size: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="animated-bg"></div>
    <div class="particles" id="particlesContainer"></div>

    <div class="welcome-container">
        <div class="logo-section">
            <div class="logo-icon">
                <i class='bx bxs-briefcase'></i>
            </div>
        </div>

        <h1 class="welcome-title">Job Exhibition</h1>
        <p class="welcome-subtitle">Ready for the next big opportunity?</p>

        <div class="welcome-message">
            <span id="message-text">Welcome Back!</span>
        </div>

        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
            <div class="progress-text">Loading your panel...</div>
        </div>

        <div class="loading-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <script>
        // Create floating particles
        function createParticles() {
            const count = 50;
            const container = document.getElementById('particlesContainer');
            
            for (let i = 0; i < count; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                const size = Math.random() * 100 + 20;
                const left = Math.random() * 100;
                const duration = Math.random() * 10 + 18;
                const driftX = (Math.random() * 180) - 90;
                
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = left + '%';
                particle.style.bottom = `${-120 - Math.random() * 140}px`;
                particle.style.setProperty('--drift-x', `${driftX}px`);
                particle.style.animationDuration = duration + 's';
                particle.style.animationDelay = `-${Math.random() * duration}s`;
                
                container.appendChild(particle);
            }
        }

        // Get user data and set message
        function setWelcomeMessage() {
            const displayName = ('{{ display_name|escapejs }}' || 'User').trim() || 'User';
            document.getElementById('message-text').textContent = `Welcome Back, ${displayName}!`;
        }

        // Redirect after 3 seconds
        window.addEventListener('load', () => {
            createParticles();
            setWelcomeMessage();

            setTimeout(() => {
                const redirectUrl = '{{ next }}' || '/dashboard/';
                window.location.href = redirectUrl;
            }, 3000);
        });
    </script>
</body>
</html>
